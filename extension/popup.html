<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>SnapBug</h1>
    <div id="unconfigured-warning" style="display:none;">
      <p>Please configure your Worker URL and API key before capturing.</p>
      <a href="#" id="open-settings">Open Settings</a>
    </div>
    <button id="capture-btn">Capture Screenshot</button>
    <button id="record-btn">Record Video</button>
    <div id="recording-indicator" style="display:none;">
      <span id="rec-dot"></span>
      <span id="rec-timer">0:00</span>
      <button id="stop-btn">Stop Recording</button>
    </div>
    <div id="video-result" style="display:none;">
      <p class="result-label">Video uploaded!</p>
      <button id="copy-url-btn" title="Copy URL only">Copy URL</button>
      <button id="copy-md-btn" title="Copy full markdown">Copy Markdown</button>
    </div>
    <p id="status-msg"></p>
    <a href="#" id="settings-link" class="settings-link">Settings</a>
    <a href="#" id="update-banner" class="update-banner" style="display:none;"></a>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
