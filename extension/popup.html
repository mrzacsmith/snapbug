<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1>SnapBug</h1>
    <div id="unconfigured-warning" style="display:none;">
      <p>Please configure your Worker URL and API key before capturing.</p>
      <a href="#" id="open-settings">Open Settings</a>
    </div>
    <button id="capture-btn">Capture Screenshot</button>
    <p id="status-msg"></p>
    <a href="#" id="settings-link" class="settings-link">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
