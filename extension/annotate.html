<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBug — Annotate</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="annotate-container">
    <div class="toolbar" id="toolbar">
      <div class="tool-group" id="tools">
        <button class="tool-btn active" data-tool="pen" title="Pen">&#9998;</button>
        <button class="tool-btn" data-tool="arrow" title="Arrow">&#10148;</button>
        <button class="tool-btn" data-tool="rect" title="Rectangle">&#9634;</button>
        <button class="tool-btn" data-tool="text" title="Text">T</button>
        <button class="tool-btn" data-tool="crop" title="Crop">&#9986;</button>
      </div>
      <div class="separator"></div>
      <div class="tool-group" id="colors"></div>
      <div class="separator"></div>
      <div class="tool-group" id="widths"></div>
      <div class="separator"></div>
      <div class="tool-group">
        <button class="tool-btn" id="undo-btn" title="Undo (Ctrl+Z)">&#8630;</button>
        <button class="tool-btn" id="clear-btn" title="Clear All">&#10005;</button>
      </div>
      <div class="toolbar-spacer"></div>
      <div class="upload-section" id="upload-section">
        <div id="upload-result" style="display:none;">
          <span id="upload-url"></span>
          <button id="copy-again-btn" class="copy-btn">Copy again</button>
        </div>
        <button id="upload-btn" class="upload-btn">Upload</button>
      </div>
    </div>
    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="base-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <textarea id="text-input" style="display:none;"></textarea>
    </div>
    <p id="annotate-status">Loading screenshot...</p>
  </div>
  <script type="module" src="annotate.js"></script>
</body>
</html>
