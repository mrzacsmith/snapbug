<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBug Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="options-container">
    <h1>SnapBug Settings</h1>
    <form id="settings-form">
      <label for="worker-url">Worker URL</label>
      <input type="url" id="worker-url" placeholder="https://snapbug.example.workers.dev" required>

      <label for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="Enter your shared API key" required>

      <button type="submit" id="save-btn">Save</button>
      <p id="settings-status"></p>
    </form>
  </div>
  <script src="options.js"></script>
</body>
</html>
