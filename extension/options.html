<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBug Settings — Gauntlet AI Engineering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <h1>SnapBug Settings</h1>
    <p class="subtitle">Gauntlet AI Engineering</p>
    <form id="settings-form">
      <label for="worker-url">Worker URL</label>
      <p class="helper-text">Get this from your team lead or the #engineering channel.</p>
      <input type="url" id="worker-url" placeholder="https://snapbug.example.workers.dev" required>

      <label for="api-key">API Key</label>
      <p class="helper-text">Shared team key — ask HQ if you don't have it.</p>
      <input type="password" id="api-key" placeholder="Enter your shared API key" required>

      <button type="submit" id="save-btn">Save</button>
      <p id="settings-status"></p>
    </form>
    <p class="version-display" id="version-display"></p>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
