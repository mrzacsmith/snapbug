<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapBug — Video Preview</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .preview-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .preview-video {
      max-width: 90vw;
      max-height: 70vh;
      border-radius: 8px;
      background: #111;
    }

    .preview-toolbar {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
    }

    .preview-btn {
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: none;
    }

    .preview-btn.upload {
      background: #C09E5A;
      color: #000;
    }

    .preview-btn.upload:hover {
      background: #B8914F;
    }

    .preview-btn.upload:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .preview-btn.discard {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }

    .preview-btn.discard:hover {
      background: #1A1A1A;
      color: #ccc;
    }

    #preview-status {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }

    #preview-status.success {
      color: #38a169;
    }

    #preview-status.error {
      color: #e53e3e;
    }

    .preview-result {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #1A1A1A;
      border: 1px solid #38a169;
      border-radius: 6px;
      text-align: center;
    }

    .preview-result .result-url {
      font-size: 12px;
      color: #C09E5A;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .preview-result .copy-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .copy-btn {
      padding: 6px 12px;
      border-radius: 4px;
      font-family: 'Roboto', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
    }

    .copy-btn.url {
      background: #C09E5A;
      color: #000;
      border: none;
    }

    .copy-btn.url:hover {
      background: #B8914F;
    }

    .copy-btn.md {
      background: transparent;
      color: #C09E5A;
      border: 1px solid #C09E5A;
    }

    .copy-btn.md:hover {
      background: #2B2B2B;
    }

    .no-video {
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <video id="preview-video" class="preview-video" controls></video>
    <div class="preview-toolbar">
      <button id="upload-btn" class="preview-btn upload">Upload</button>
      <button id="discard-btn" class="preview-btn discard">Discard</button>
    </div>
    <p id="preview-status"></p>
    <div id="preview-result" class="preview-result">
      <p class="result-url" id="result-url"></p>
      <div class="copy-btns">
        <button id="copy-url-btn" class="copy-btn url">Copy URL</button>
        <button id="copy-md-btn" class="copy-btn md">Copy Markdown</button>
      </div>
    </div>
    <p id="no-video" class="no-video" style="display:none;">No video recording found.</p>
  </div>
  <script type="module" src="video-preview.js"></script>
</body>
</html>
